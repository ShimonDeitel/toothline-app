name: Toothline
options:
  bundleIdPrefix: com.shimondeitel.toothline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Toothline:
    type: application
    platform: iOS
    sources:
      - path: Toothline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toothline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Toothline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ToothlineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ToothlineTests
      - path: Toothline.storekit
    dependencies:
      - target: Toothline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toothline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ToothlineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ToothlineUITests
    dependencies:
      - target: Toothline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toothline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Toothline:
    build:
      targets:
        Toothline: all
        ToothlineTests: [test]
        ToothlineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Toothline.storekit
    test:
      config: Debug
      storeKitConfiguration: Toothline.storekit
      targets:
        - ToothlineTests
        - ToothlineUITests
    archive:
      config: Release
