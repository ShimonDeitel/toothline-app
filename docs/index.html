<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toothline</title><style>
    body { margin:0; background:#101319; color:#E9EDF5; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
    .wrap { max-width:640px; margin:0 auto; padding:64px 24px; text-align:center; }
    h1 { font-size:2.4rem; margin-bottom:8px; }
    .accent { color:#7A9CC6; }
    p.tag { color:#8FA3C0; font-size:1.1rem; margin-bottom:32px; }
    .card { background:#181D26; border-radius:16px; padding:24px; margin:16px 0; text-align:left; }
    a { color:#7A9CC6; }
    footer { margin-top:48px; color:#8FA3C0; font-size:0.85rem; }
    
  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #4FB0AE55 0%, #4FB0AE00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head>
<body>
<div class="orb"></div><div class="wrap">
<h1>Toothline</h1>
<p class="tag">Record when each baby tooth comes in and later falls out.</p>
<div class="card"><strong>Free:</strong> Tap-a-tooth diagram to log eruption dates</div>
<div class="card"><strong class="accent">Pro:</strong> Tooth-fairy log with photo and falling-out dates</div>
<p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
<footer>Contact: s0533495227@gmail.com</footer>
</div></body></html>
